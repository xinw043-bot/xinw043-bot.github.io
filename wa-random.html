<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connecting to Sales Manager...</title>
    <style>
        body { font-family: -apple-system, sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; background-color: #f4f5f7; color: #333; text-align: center; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #007bff; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin-bottom: 20px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .btn { display: none; margin-top: 20px; padding: 12px 24px; border-radius: 25px; color: white; text-decoration: none; font-weight: bold; font-size: 16px; }
        .btn.wa { background-color: #25D366; }
        .btn.tg { background-color: #0088cc; }
    </style>
</head>
<body>

    <div class="loader" id="loader"></div>
    <h2 id="statusText">Connecting you to your manager...</h2>
    <p style="font-size: 14px; color: #666; padding: 0 20px;">If the app does not open automatically, please click the button below.</p>
    
    <a href="#" id="manualBtn" class="btn">Open App</a>

    <script>
        // 1. 获取网址中的参数
        const urlParams = new URLSearchParams(window.location.search);
        const channel = urlParams.get('channel');
        const phone = urlParams.get('phone');
        const account = urlParams.get('account');

        let targetUrl = "";
        const btn = document.getElementById('manualBtn');

        // 2. 根据参数组合最终的唤起链接
        if (channel === 'wa' && phone) {
            targetUrl = "https://wa.me/" + phone;
            btn.classList.add('wa');
            btn.classList.add('show');
            btn.innerText = "Open WhatsApp";
            btn.style.display = "inline-block";
        } else if (channel === 'tg' && account) {
            targetUrl = "https://t.me/" + account;
            btn.classList.add('tg');
            btn.classList.add('show');
            btn.innerText = "Open Telegram";
            btn.style.display = "inline-block";
        } else {
            document.getElementById('statusText').innerText = "Error: Invalid Link parameters.";
            document.getElementById('loader').style.display = "none";
        }

        // 3. 自动跳转与兜底手动按钮
        if (targetUrl !== "") {
            btn.href = targetUrl;
            // 延迟 800ms 自动跳转，给系统一点反应时间
            setTimeout(() => {
                window.location.href = targetUrl;
            }, 800);
        }
    </script>
</body>
</html>
